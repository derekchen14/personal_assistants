# Dana — Data Analysis Assistant (domain config)

models:
  default:
    provider: anthropic
    model_id: claude-sonnet-4-5-latest
    temperature: 0.0
    max_output_tokens: 4096
  overrides:
    skill:
      model_id: claude-opus-4-6
    naturalize:
      temperature: 0.5
    nlu:
      model_id: claude-sonnet-4-5-latest
    nlu_vote_haiku:
      provider: anthropic
      model_id: claude-haiku-4-5-20251001
    nlu_vote_sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-5-latest
    nlu_vote_gemini:
      provider: google
      model_id: gemini-2.0-flash

persona:
  name: Dana
  tone: analytical
  response_style: concise
  expertise_boundaries:
    - tabular data analysis
    - data visualization
    - SQL queries
    - statistical summaries
    - data cleaning and transformation
  colors:
    primary: "#0d9488"
    primary_dark: "#0f766e"
    accent: "#06b6d4"

guardrails:
  input_max_tokens: 8192
  content_filter:
    enabled: true
    categories: [violence, sexual, hate_speech, self_harm, dangerous]
    severity: medium
  pii_detection:
    enabled: false
  prompt_injection_detection:
    enabled: true
    sensitivity: medium

tools:
  dataset_load:
    tool_id: dataset_load
    description: "Load a dataset from file or seed data into the workspace"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema:
      type: object
      properties:
        name: {type: string, description: "Name or identifier of the dataset to load"}
        source: {type: string, description: "File path, URL, or 'seed' for built-in datasets"}
        format: {type: string, enum: [csv, json, excel, seed], description: "Data format"}
      required: [name]

  sql_execute:
    tool_id: sql_execute
    description: "Execute a SQL query against a loaded dataset using pandasql"
    timeout_ms: 30000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema:
      type: object
      properties:
        query: {type: string, description: "SQL query to execute against loaded datasets"}
        dataset: {type: string, description: "Primary dataset name for the query context"}
      required: [query]

  python_execute:
    tool_id: python_execute
    description: "Execute a Python expression against a loaded dataset"
    timeout_ms: 30000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema:
      type: object
      properties:
        code: {type: string, description: "Python expression or statement to execute"}
        dataset: {type: string, description: "Dataset name available as 'df' variable"}
      required: [code]

  column_analyze:
    tool_id: column_analyze
    description: "Compute statistics for a specific column (min, max, mean, nulls)"
    timeout_ms: 10000
    caching: true
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name"}
        column: {type: string, description: "Column name to analyze"}
        metrics: {type: array, items: {type: string}, description: "Metrics to compute: min, max, mean, median, std, nulls, unique"}
      required: [dataset, column]

  chart_render:
    tool_id: chart_render
    description: "Render a chart (bar, line, pie, scatter) as base64 PNG"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name"}
        chart_type: {type: string, enum: [bar, line, pie, scatter, histogram], description: "Type of chart"}
        x: {type: string, description: "Column for x-axis"}
        y: {type: string, description: "Column for y-axis"}
        title: {type: string, description: "Chart title"}
        color: {type: string, description: "Column for color grouping"}
      required: [dataset, chart_type]

  formula_apply:
    tool_id: formula_apply
    description: "Apply a formula or computed column to a dataset"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name"}
        column: {type: string, description: "New column name for the result"}
        formula: {type: string, description: "Python expression using column names (e.g., 'price * quantity')"}
      required: [dataset, column, formula]

  merge_run:
    tool_id: merge_run
    description: "Merge or join two datasets on a shared key"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema:
      type: object
      properties:
        left: {type: string, description: "Left dataset name"}
        right: {type: string, description: "Right dataset name"}
        key: {type: string, description: "Column name to join on"}
        how: {type: string, enum: [inner, left, right, outer], description: "Join type"}
      required: [left, right, key]

  pivot_run:
    tool_id: pivot_run
    description: "Pivot or reshape a dataset between wide and long format"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name"}
        index: {type: string, description: "Column for row labels"}
        columns: {type: string, description: "Column for column headers"}
        values: {type: string, description: "Column for cell values"}
        aggfunc: {type: string, description: "Aggregation function (sum, mean, count)"}
      required: [dataset, index, columns, values]

  validate_check:
    tool_id: validate_check
    description: "Run validation rules and flag failing rows"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name"}
        rules:
          type: array
          items:
            type: object
            properties:
              column: {type: string}
              check: {type: string}
              value: {}
            required: [column, check]
          description: "Validation rules to apply"
        action: {type: string, enum: [flag, drop, fill], description: "What to do with failing rows"}
      required: [dataset, rules]

  export_run:
    tool_id: export_run
    description: "Export a dataset to CSV, JSON, or clipboard"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: true
    input_schema:
      type: object
      properties:
        dataset: {type: string, description: "Dataset name to export"}
        format: {type: string, enum: [csv, json, clipboard], description: "Export format"}
        path: {type: string, description: "Output file path (optional for clipboard)"}
      required: [dataset, format]

display:
  types: [Default, Dynamic]
  chart_types: [bar, line, pie, scatter, histogram]
  page_size: 256
