# Dana — Data Analysis Assistant (domain config)

models:
  default:
    provider: anthropic
    model_id: claude-sonnet-4-5-latest
    temperature: 0.0
    max_output_tokens: 4096
  overrides:
    skill:
      model_id: claude-opus-4-6
    naturalize:
      temperature: 0.5
    nlu:
      model_id: claude-sonnet-4-5-latest
    nlu_vote_haiku:
      provider: anthropic
      model_id: claude-haiku-4-5-20251001
    nlu_vote_sonnet:
      provider: anthropic
      model_id: claude-sonnet-4-5-latest
    nlu_vote_gemini:
      provider: google
      model_id: gemini-2.0-flash

persona:
  name: Dana
  tone: analytical
  response_style: concise
  expertise_boundaries:
    - tabular data analysis
    - data visualization
    - SQL queries
    - statistical summaries
    - data cleaning and transformation
  colors:
    primary: "#0d9488"
    primary_dark: "#0f766e"
    accent: "#06b6d4"

guardrails:
  input_max_tokens: 8192
  content_filter:
    enabled: true
    categories: [violence, sexual, hate_speech, self_harm, dangerous]
    severity: medium
  pii_detection:
    enabled: false
  prompt_injection_detection:
    enabled: true
    sensitivity: medium

tools:
  dataset_load:
    tool_id: dataset_load
    description: "Load a dataset from file or seed data into the workspace"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema: dataset_load.json

  sql_execute:
    tool_id: sql_execute
    description: "Execute a SQL query against a loaded dataset using pandasql"
    timeout_ms: 30000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema: sql_execute.json

  python_execute:
    tool_id: python_execute
    description: "Execute a Python expression against a loaded dataset"
    timeout_ms: 30000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema: python_execute.json

  column_analyze:
    tool_id: column_analyze
    description: "Compute statistics for a specific column (min, max, mean, nulls)"
    timeout_ms: 10000
    caching: true
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema: column_analyze.json

  chart_render:
    tool_id: chart_render
    description: "Render a chart (bar, line, pie, scatter) as base64 PNG"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema: chart_render.json

  formula_apply:
    tool_id: formula_apply
    description: "Apply a formula or computed column to a dataset"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema: formula_apply.json

  merge_run:
    tool_id: merge_run
    description: "Merge or join two datasets on a shared key"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema: merge_run.json

  pivot_run:
    tool_id: pivot_run
    description: "Pivot or reshape a dataset between wide and long format"
    timeout_ms: 15000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: false
    input_schema: pivot_run.json

  validate_check:
    tool_id: validate_check
    description: "Run validation rules and flag failing rows"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: true
      communicates_externally: false
    input_schema: validate_check.json

  export_run:
    tool_id: export_run
    description: "Export a dataset to CSV, JSON, or clipboard"
    timeout_ms: 10000
    caching: false
    capabilities:
      accesses_private_data: true
      receives_untrusted_input: false
      communicates_externally: true
    input_schema: export_run.json

display:
  types: [Default, Dynamic]
  chart_types: [bar, line, pie, scatter, histogram]
  page_size: 256
