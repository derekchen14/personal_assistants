        - paragraph [ref=e582]:
          - text: "This is the core problem with the prompt approach:"
          - strong [ref=e583]: the model lacks the context to know when it's in an ambiguous situation
          - text: . The prompt tells it to be cautious, but without a prior classification signal, the model sometimes applies that caution to clear requests too, which degrades performance on the categories where it was already doing well.
        - separator [ref=e584]
        - heading "6. Designing for Uncertainty" [level=2] [ref=e585]
        - paragraph [ref=e586]: The pipeline provides three things direct tool-calling doesn't.
        - paragraph [ref=e587]: First, flow detection produces a distribution over flows rather than a point estimate. Low confidence is a signal, not noise. Second, the ambiguity handler is accessible before the tool-selection stage, not nominally available as one of 56 tools. Third, detecting ambiguity and selecting a tool are two distinct decisions, handled by two distinct stages.
        - paragraph [ref=e588]: "The practical recommendation for agent builders: if your system has a \"clarify\" or \"ask_followup\" tool, make it reachable before tool selection, rather than relying on prompt instructions alone. An upstream classifier that routes to clarification before the tool-selection stage is doing work that the tool-selection model cannot replicate through prompting alone."
        - paragraph [ref=e589]: This generalizes beyond ambiguity handling. The flow detection stage is doing intent disambiguation through a dedicated classification step rather than being folded into the tool-selection inference. Any multi-intent agent where users can make underspecified requests should consider a similar architecture.
        - paragraph [ref=e590]: "The broader principle: identify which decisions require routing and which decisions require content understanding. Flat tool-calling conflates both. The pipeline separates them."
        - separator [ref=e591]
