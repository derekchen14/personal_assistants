        - heading "Direct Tool-Calling Collapses on Ambiguous Requests" [level=1] [ref=e424]
        - heading "1. Introduction" [level=2] [ref=e425]
        - paragraph [ref=e426]:
          - text: "Imagine a user says:"
          - emphasis [ref=e427]: "\"Can you check on that last post?\""
        - paragraph [ref=e428]: "This could mean at least three things: pull up the post to review it, check its publication status, or analyze how it's performing. In a well-designed system, the agent asks a clarifying question. In direct tool-calling, the agent picks the most probable tool and executes, often incorrectly."
        - paragraph [ref=e429]:
          - text: This failure mode differs from
          - strong [ref=e430]: hallucination
          - text: "in a specific way: the routing decision happens before any content is generated. The model selected the wrong tool for the user's underlying intent, and nothing in the output revealed that. The response is fluent. The parameters look reasonable. If a human glanced at the output, nothing would seem amiss."
        - paragraph [ref=e431]:
          - text: We call this
          - strong [ref=e432]: confident misdirection
          - text: ": fluent, grammatically correct, but executed for the wrong task."
        - paragraph [ref=e433]:
          - text: In our evaluation, direct tool-calling accuracy on underspecified first-turn requests ranged from
          - strong [ref=e434]: 37.5% to 57.3%
          - text: across 8 models, averaging
          - strong [ref=e435]: 47.2%
          - text: . This is not a failure of a single weak model. It is a consistent gap across every model we tested.
        - paragraph [ref=e436]: "When the model doesn't know what it doesn't know, you get confident misdirection: below 50% accuracy on ambiguous turns for most models."
        - separator [ref=e437]
        - heading "2. What Ambiguity Looks Like in Dialogue" [level=2] [ref=e438]
        - paragraph [ref=e439]: "Our evaluation dataset includes four conversational turn categories:"
        - list [ref=e440]:
          - listitem [ref=e441]:
            - strong [ref=e442]: same-flow
            - text: ": the user continues the same task as the previous turn ("
            - emphasis [ref=e443]: "\"Same thing for the performance benchmarks section\""
            - text: )
          - listitem [ref=e444]:
            - strong [ref=e445]: switch-flow
            - text: ": the user pivots to a different task mid-conversation ("
            - emphasis [ref=e446]: "\"Now I want to check when this is scheduled to go out\""
            - text: )
          - listitem [ref=e447]:
            - strong [ref=e448]: ambiguous-first
            - text: ": the opening message is underspecified, and the user's intent can't be resolved without context or clarification ("
            - emphasis [ref=e449]: "\"Can you help me with the developer tools post?\""
            - text: )
          - listitem [ref=e450]:
            - strong [ref=e451]: ambiguous-second
            - text: ": the follow-up turn introduces context that conflicts with or overrides the apparent intent established earlier"
        - paragraph [ref=e452]:
          - text: The last two categories are inevitable in any real deployment. Users don't narrate their intent. They rely on shared context, anaphora, and implicit reference.
          - emphasis [ref=e453]: "\"That last one\""
          - text: ","
          - emphasis [ref=e454]: "\"the same thing\""
          - text: ","
          - emphasis [ref=e455]: "\"can you check on it\""
          - text: are how people talk to systems they expect to understand them.
        - paragraph [ref=e456]: "These utterances are well-formed. The direct tool-selection model just has to do two things at once in a single inference step:"
        - list [ref=e457]:
          - listitem [ref=e458]:
            - strong [ref=e459]: Detect
            - text: whether the request is ambiguous
          - listitem [ref=e460]:
            - strong [ref=e461]: Select
            - text: the right tool, given that judgment
        - paragraph [ref=e462]: Both tasks get conflated into a single inference step. The model has no signal that it's in an ambiguous situation. It sees an underspecified utterance and assigns probability mass across the tool inventory.
        - separator [ref=e463]
        - 'heading "3. The Flat Baseline: Where It Breaks" [level=2] [ref=e464]'
        - blockquote [ref=e465]:
          - paragraph [ref=e466]:
            - strong [ref=e467]: Ambiguous-first turns lagged switch-flow turns by roughly 21 percentage points across all 8 models, the largest per-category gap in our evaluation.
        - paragraph [ref=e468]:
          - strong [ref=e469]: Figure 1
          - text: ":"
          - emphasis [ref=e470]: Flat tool-calling accuracy by turn category per model. Ambiguous-first is the hardest category for every model. Models that perform well on clear turns (same-flow, switch-flow) show large accuracy drops on ambiguous-first.
