            - text: may achieve larger gains via prompting than our simple hint experiment suggests. We did not test these.
          - listitem [ref=e602]: The study measures routing accuracy, not downstream quality. Even when the pipeline routes correctly to the ambiguity handler, the quality of the clarification question generated is a separate issue we did not evaluate.