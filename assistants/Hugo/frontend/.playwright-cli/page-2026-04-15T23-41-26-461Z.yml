        - paragraph [ref=e497]: "The gradient is consistent across capability tiers: high-tier models (Opus, Qwen3) score 45.6% and 50.5% respectively on ambiguous-first. Mid-tier Sonnet manages 43.5%. Even Gemini 3.1 Pro, the strongest direct model in our benchmark at 76.4% overall, only reaches 55.2% on ambiguous-first. GPT-5 mini scores highest (57.3%) but this is still well below any model's performance on clear turns."
        - paragraph [ref=e498]:
          - text: Two reasons compound to produce this failure mode. First, the model has no mechanism to recognize it's in an ambiguous situation before committing to a tool call. It receives the utterance, generates logits over the tool vocabulary, and picks the argmax. The prompt can say "call
          - code [ref=e499]: handle_ambiguity
          - text: when uncertain," but without a prior classification step, the model can't reliably distinguish uncertain from certain contexts.
        - paragraph [ref=e500]:
          - text: Second, ambiguous turns expose the model to high-entropy tool distributions. On a clear expansion request, the probability mass concentrates on
          - code [ref=e501]: expand_content
          - text: . On
          - emphasis [ref=e502]: "\"can you check on that post?\""
          - text: ", the mass spreads across"
          - code [ref=e503]: read_post
          - text: ","
          - code [ref=e504]: check_platform
          - text: ","
          - code [ref=e505]: analyze_content
          - text: ","
          - code [ref=e506]: search_posts
          - text: ", and"
          - code [ref=e507]: handle_ambiguity
          - text: . The model picks the plurality winner, which may or may not be the right call.
        - paragraph [ref=e508]: "Under direct tool-calling, the most common errors on ambiguous Hugo turns were:"
        - list [ref=e509]:
          - listitem [ref=e510]:
            - code [ref=e511]: ambiguous
            - text: →
            - code [ref=e512]: search_posts
            - text: (97 occurrences across models/seeds)
          - listitem [ref=e513]:
