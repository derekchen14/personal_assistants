            - text: (57 occurrences)
        - paragraph [ref=e522]: The model defaults to semantically plausible tools (reading, searching, analyzing) because those are the most likely responses to underspecified inputs. But "likely" and "correct" diverge badly when the right action is to ask a clarifying question.
        - separator [ref=e523]
        - 'heading "4. The Pipeline Solution: Catching Ambiguity Early" [level=2] [ref=e524]'
        - paragraph [ref=e525]:
          - text: The pipeline addresses this at the architectural level.
          - strong [ref=e526]: Flow detection
          - text: runs before tool selection. When the flow detector is uncertain about which specific user intent applies, the system can route to an ambiguity handler instead of guessing at a tool.
        - paragraph [ref=e527]:
          - text: "The mechanism: the flow detection stage produces a confidence signal over the ~42 candidate flows. When confidence is low, as it will be for underspecified inputs, the system routes to the"
          - code [ref=e528]: ambiguity_handler
          - text: intent rather than propagating uncertainty down to the tool-selection stage.
        - blockquote [ref=e529]:
          - paragraph [ref=e530]: You can't fix the ambiguity problem at the tool-selection layer, because the model at that layer has no access to the information that would tell it something is ambiguous. You have to fix it upstream.
        - paragraph [ref=e531]:
          - text: For ambiguous-first turns, our flow detection ensemble achieved
          - strong [ref=e532]: 78.8% accuracy
          - text: ", a ~31 percentage point improvement over the direct baseline."
        - paragraph [ref=e533]: That's still imperfect. 78.8% flow detection on ambiguous-first leaves 21.2% of cases reaching the tool-selection stage unresolved. But it is achievable with a dedicated ensemble rather than hoping the base model self-reports uncertainty.
        - paragraph [ref=e534]:
          - strong [ref=e535]: Figure 2
          - text: ":"
          - emphasis [ref=e536]: Pipeline E2E vs. direct accuracy, with ambiguous categories highlighted. The pipeline's advantage is largest on the turn categories where direct tool-calling breaks down.
        - paragraph [ref=e537]: "For other turn categories, the flow detection ensemble performs better by 15+ percentage points: 93.4% on same-flow and ambiguous-second, 92.8% on switch-flow. The 78.8% on ambiguous-first reflects the difficulty of the case. These are utterances where even human annotators might disagree about intent. And it's still better than what direct mode achieves."
        - separator [ref=e538]
