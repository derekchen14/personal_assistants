        - list [ref=e593]:
          - listitem [ref=e594]:
            - text: Our ambiguous turn categories were
            - strong [ref=e595]: synthetically constructed
            - text: "to have specific ambiguity properties. Real-world ambiguity has a different distribution: more diverse, less controlled, potentially higher entropy."
          - listitem [ref=e596]:
            - text: The
            - strong [ref=e597]: 78.8% flow detection accuracy
            - text: on ambiguous-first is imperfect. The ensemble approach helps, but there is meaningful headroom remaining.
