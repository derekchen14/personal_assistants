<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Builder \u2014 Round 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
    .monospace { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
    pre { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center gap-4">
      <h1 class="text-lg font-semibold">Policy Builder</h1>
      <span id="round-label" class="text-sm text-slate-500"></span>
      <div class="flex-1"></div>
      <label class="text-sm text-slate-600">Flow:</label>
      <select id="flow-switcher" class="border border-slate-300 rounded px-2 py-1 text-sm"></select>
      <button id="save-btn" class="bg-slate-900 text-white text-sm rounded px-3 py-1 hover:bg-slate-700">Save feedback</button>
      <span id="save-status" class="text-xs text-slate-500 w-24 text-right"></span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6">
    <div id="flow-notes" class="bg-amber-50 border border-amber-200 text-amber-900 text-sm rounded px-3 py-2 mb-4 hidden"></div>
    <div id="sections" class="space-y-4"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
